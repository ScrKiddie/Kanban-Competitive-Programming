name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-windows:
    name: Build Windows Release
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version from tag
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = node -p "require('./package.json').version"
          }

          $env:RELEASE_VERSION = $version
          @'
          const fs = require('fs');

          const version = process.env.RELEASE_VERSION;

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = version;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');

          const cargoPath = 'src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8').replace(/^version = ".*"/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);
          '@ | Set-Content update-version.cjs
          node update-version.cjs

          echo "Release version: $version"

      - name: Build and publish Windows installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'manual' }}
          releaseName: ${{ github.ref_type == 'tag' && format('KanbanCP {0}', github.ref_name) || 'KanbanCP Manual Build' }}
          releaseBody: Download the Windows installer from the assets below.
          releaseDraft: false
          prerelease: false
          args: ""
